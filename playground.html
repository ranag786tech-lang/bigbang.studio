<script>
    const SUPABASE_URL = 'https://gjlugafyrznldyoarfil.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_M_2aRHByQF6Orqla716ztQ_TMqG6PUK';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;

    // Auth State Change
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            showProfile();
            loadProjects();
        } else {
            currentUser = null;
            hideProfile();
        }
    });

    // Check user on page load
    async function checkUser() {
        try {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error) { console.warn('getUser error', error); return; }
            if (user) {
                currentUser = user;
                showProfile();
                loadProjects();
            }
        } catch (err) {
            console.error('checkUser failed', err);
        }
    }
    checkUser();

    function showProfile() {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('profile').style.display = 'flex';
        document.getElementById('userName').textContent = currentUser.user_metadata?.full_name || currentUser.email;
        document.getElementById('userAvatar').src = currentUser.user_metadata?.avatar_url || 'https://github.com/github.png';
    }

    function hideProfile() {
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('profile').style.display = 'none';
    }

    // Modal
    function openModal() { document.getElementById('loginModal').classList.add('active'); }
    function closeModal() { document.getElementById('loginModal').classList.remove('active'); }

    // Auth Functions - SIRF EK BAAR
    async function signInWithGitHub() {
        const { error } = await supabase.auth.signInWithOAuth({ 
            provider: 'github',
            options: {
                redirectTo: 'https://bigbang-studio.vercel.app/playground.html'
            }
        });
        if (error) alert('GitHub login error: ' + error.message);
    }

    async function signInWithGoogle() {
        const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: 'https://bigbang-studio.vercel.app/playground.html' }
        });
        if (error) alert('Google login error: ' + error.message);
    }

    async function signInWithEmail() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else closeModal();
    }

    async function signUpWithEmail() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else { alert('Check your email to confirm!'); closeModal(); }
    }

    async function signOut() {
        await supabase.auth.signOut();
        document.getElementById('profileDropdown').classList.remove('active');
    }

    // Profile Dropdown
    document.getElementById('profile').onclick = () => {
        document.getElementById('profileDropdown').classList.toggle('active');
    }

    // Sidebar
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // Generate Code
    async function generateCode() {
        if (!currentUser) return openModal();
        
        const prompt = document.getElementById('prompt').value;
        if (!prompt) return alert('Prompt likho bhai!');
        
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.textContent = 'Generating...';
        
        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const data = await res.json();
            
            document.getElementById('preview').srcdoc = data.code;
            
            // Save to database
            await supabase.from('projects').insert({
                user_id: currentUser.id,
                prompt: prompt,
                code: data.code
            });
            
            loadProjects();
        } catch (err) {
            alert('Error: ' + err.message);
        }
        
        btn.disabled = false;
        btn.textContent = 'Generate';
    }

    // Load Projects
    async function loadProjects() {
        if (!currentUser) return;
        try {
            const { data, error } = await supabase.from('projects')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            if (error) { console.error('loadProjects error', error); return; }
            const list = document.getElementById('projectsList');
            list.innerHTML = (data || []).map(p => `
                <div class="project-item" onclick="loadProject('${p.id}')">
                    ${String(p.prompt || '').substring(0, 30)}...
                </div>
            `).join('');
        } catch (err) {
            console.error('loadProjects failed', err);
        }
    }

    async function loadProject(id) {
        const { data } = await supabase.from('projects').select('*').eq('id', id).single();
        document.getElementById('preview').srcdoc = data.code;
        document.getElementById('prompt').value = data.prompt;
        if (window.innerWidth < 768) toggleSidebar();
    }
</script>
