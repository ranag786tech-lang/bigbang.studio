<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Bang Studio - AI App Builder</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
        .header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { font-size: 24px; font-weight: 700; color: #3b82f6; }
        .btn { background: #3b82f6; border: none; color: #fff; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; }
        .btn:hover { background: #2563eb; }
        .hero { text-align: center; padding: 100px 5%; }
        .hero h1 { font-size: 48px; margin-bottom: 20px; }
        .hero p { font-size: 20px; color: #888; margin-bottom: 40px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-box { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 30px; width: 90%; max-width: 400px; }
        .modal-box h2 { margin-bottom: 20px; }
        .modal-box button { width: 100%; background: #3b82f6; border: none; color: #fff; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 10px; }
        .modal-box .github-btn { background: #24292e; }
        .modal-box .close { background: #333; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Big Bang Studio</div>
        <button class="btn" onclick="openModal()">Sign In</button>
    </div>

    <div class="hero">
        <h1>Build Apps with AI</h1>
        <p>Describe your idea. Get production-ready code. No coding required.</p>
        <a href="/playground.html" class="btn">Start Building Free</a>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-box">
            <h2>Sign In to Big Bang Studio</h2>
            <button class="github-btn" onclick="signInWithGitHub()">Continue with GitHub</button>
            <button class="close" onclick="closeModal()">Close</button>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://tcxwhkwkzekgiurcumjt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjeHdoa3dremVrZ2l1cmN1bWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjk0NDEsImV4cCI6MjA5MTY0NTQ0MX0.iVV5gFCMUmzbscTxyY9qNGU0Tg0AzTozrLYbiLSp_kI';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Check if already logged in
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) window.location.href = '/playground.html';
    });

    function openModal() { document.getElementById('loginModal').classList.add('active'); }
    function closeModal() { document.getElementById('loginModal').classList.remove('active'); }

    async function signInWithGitHub() {
        await supabase.auth.signInWithOAuth({ 
            provider: 'github',
            options: { redirectTo: 'https://bigbang-studio.vercel.app/playground.html' }
        });
    }
</script>
</body>
</html>
